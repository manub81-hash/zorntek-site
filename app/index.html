<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Télécharger PizzAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }
        .container { max-width: 420px; }
        .logo { font-size: 64px; margin-bottom: 16px; }
        h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 36px;
            color: #fff;
            margin-bottom: 8px;
        }
        h1 span { color: #d4a44a; }
        .tagline {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 32px;
        }
        .redirect-msg {
            color: #d4a44a;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .store-links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s, opacity 0.2s;
            width: 260px;
            justify-content: center;
        }
        .store-btn:hover { transform: scale(1.03); }
        .store-btn.android {
            background: #d4a44a;
            color: #0a0a0a;
        }
        .store-btn.ios {
            background: rgba(255,255,255,0.1);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .spinner {
            width: 24px; height: 24px;
            border: 3px solid rgba(212,164,74,0.2);
            border-top-color: #d4a44a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
    <script>
        (function() {
            var ua = navigator.userAgent || '';
            var isAndroid = /android/i.test(ua);
            var isIOS = /iphone|ipad|ipod/i.test(ua);
            var playUrl = 'https://play.google.com/store/apps/details?id=com.zorntek.pizzai';
            var appStoreUrl = 'https://apps.apple.com/app/id6761267496';

            if (isAndroid) {
                window.location.href = playUrl;
            } else if (isIOS) {
                window.location.href = appStoreUrl;
            }
        })();
    </script>
</head>
<body>
<div class="container">
    <div class="logo">🍕</div>
    <h1>Pizz<span>AI</span></h1>
    <p class="tagline">Ton pizzaiolo intelligent</p>

    <div id="redirect-msg" class="redirect-msg spinner-wrap">
        <div class="spinner"></div>
        Redirection en cours...
    </div>

    <div class="store-links">
        <a href="https://play.google.com/store/apps/details?id=com.zorntek.pizzai" class="store-btn android">
            ▶ Google Play Store
        </a>
        <a href="https://apps.apple.com/app/id6761267496" class="store-btn ios">
             App Store
        </a>
    </div>
</div>

<script>
    setTimeout(function() {
        var msg = document.getElementById('redirect-msg');
        if (msg) msg.classList.add('hidden');
    }, 2000);
</script>
</body>
</html>
