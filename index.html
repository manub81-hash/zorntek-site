<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PizzAI — Télécharger</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0806;color:#f5e6d3;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{max-width:380px}
  .logo{font-size:64px;margin-bottom:8px}
  h1{font-size:28px;font-weight:700;margin-bottom:4px}
  h1 span{color:#d4a44a}
  .tagline{color:#a89480;font-size:14px;margin-bottom:32px}
  .badges{display:flex;flex-direction:column;gap:16px;align-items:center}
  .badges a img{height:52px}
  .or{color:#6b6259;font-size:13px;margin:8px 0}
  .redirect-msg{color:#6b6259;font-size:12px;margin-top:24px}
</style>
<script>
  var ua = navigator.userAgent || '';
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);
  if (isIOS) {
    window.location.replace('https://apps.apple.com/app/id6761267496');
  } else if (isAndroid) {
    window.location.replace('https://play.google.com/store/apps/details?id=com.zorntek.pizzai');
  }
</script>
</head>
<body>
<div class="card">
  <div class="logo">🍕</div>
  <h1>Pizz<span>AI</span></h1>
  <p class="tagline">Ton pizzaiolo intelligent</p>
  <div class="badges">
    <a href="https://apps.apple.com/app/id6761267496">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
    <a href="https://play.google.com/store/apps/details?id=com.zorntek.pizzai">
      <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" alt="Get it on Google Play" style="height:52px">
    </a>
  </div>
  <p class="redirect-msg">Redirection automatique sur mobile...</p>
</div>
</body>
</html>
